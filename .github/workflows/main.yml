# nom
name: e2e tests cypress et PHP
# declencheur
on:
  push:
    branches:
      - feature
  pull_request:
    branches:
      - feature
      - main
  workflow_dispatch:
# environnement
jobs:
  build:
    # image unbuntu
    runs-on: ubuntu-latest
    # base de données
    services:
      # Service MySQL
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: ci_cd
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -prootpw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5      
    # etape : checkout code
    steps:
      - name: checkout recuperation du code
        uses: actions/checkout@v6
      #install de php
      - name: Setup PHP with PECL extension
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql, sodium, zip
          tools: composer
      - name: fichier .env.docker .env
        run: |
          cp .env.docker .env
          echo "DATABASE_PASSWORD=rootpw">> .env
          cat .env
      - name: migrer la bdd
        run : |
          mysql -h 127.0.0.1 -P 3306 -u root -prootpw < db.sql
      - name: installer les dépendances
        run: | 
          composer install
      - name: démarrer le serveur PHP
        run: |
          php -S 127.0.0.1:8080 -t public &
      # install cypress
      - name : Test Cypress
        uses: cypress-io/github-action@v6

