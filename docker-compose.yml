services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: library_app
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      APACHE_DOCUMENT_ROOT: /var/www/html/public

  db:
    image: mysql:8.4
    container_name: library_db
    env_file:
      - .env.docker
    restart: unless-stopped
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  composer:
    image: composer:2
    container_name: library_composer
    env_file:
      - .env.docker
    working_dir: /app
    volumes:
      - ./:/app
    profiles:
      - tools

volumes:
  mysql_data:
